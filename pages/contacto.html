<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serendipia | Contacto</title><meta name="description" content="Contáctate con Serendipia en Uruguay y solicita tu papelería personalizada o recursos didácticos. Respondemos consultas y presupuestos en 24 a 48 horas.">

    <!-- LINK CSS -->
    <link rel="stylesheet" href="../css/styles.css">

    <!-- BOOSTRAP CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- LINK FUENTE PERSONALIZADA -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=LINE+Seed+JP:wght@100;400;700;800&display=swap"
        rel="stylesheet">

</head>

<body>
    <!-- HEADER -->
    <header class="header">

        <!-- LOGO + MENU DE NAVEGACIÓN (BOOTSTRAP) -->
        <div class="header__bar">
            <a class="header__brand" href="../index.html">
                <img class="header__logo" src="../img/logoserendipiacolor.png" alt="Logo de Serendipia a color">
            </a>

            <nav class="navbar navbar-expand-lg header__navbar">
                <div class="container-fluid header__navWrap">
                    <button class="navbar-toggler header__toggler" type="button" data-bs-toggle="collapse"
                        data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false"
                        aria-label="Abrir menú de navegación">
                        <span class="navbar-toggler-icon"></span>
                    </button>

                    <div class="collapse navbar-collapse header__collapse" id="mainNav">
                        <ul class="navbar-nav ms-auto header__menu">
                            <li class="nav-item">
                                <a class="nav-link header__link " aria-current="Contacto" href="../index.html">Home</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link header__link" href="./catalogo.html">Catálogo</a>
                            </li>
                            <li class="nav-item">
                                <a id="activeLink" class="nav-link active header__link"
                                    href="./contacto.html">Contacto</a>
                            </li>
                        </ul>
                    </div>
                </div>
            </nav>
        </div>

        <!-- BANNER -->
        <section class="banner">
            <img src="../img/bannerserendipia.png" alt="Imagen de encabezado de Serendipia">
        </section>

    </header>

    <!-- --------------------------------------------------- -->
    <!-- MAIN | CONTACTO -->

    <main class="main">

        <!-- ENCABEZADO DE PÁGINA -->
        <section class="contactoHead" aria-label="Encabezado de contacto">
            <h1 class="contactoHead__title">Contacto</h1>
            <p class="contactoHead__subtitle">Envíanos tu consulta y te respondemos en 24/48 h.</p>
        </section>

        <!-- LAYOUT EN DOS COLUMNAS -->

        <section class="contactoLayout" aria-label="Sección de contacto">

            <!-- COLUMNA 1: FORMULARIO -->
            <div class="contactoLayout__col contactoLayout__col--form">

                <!-- FORMULARIO DE CONTACTO / BOOSTRAP -->
                <section class="contactoForm" aria-label="Formulario de contacto">
                    <h2 class="contactoForm__title">Formulario de contacto</h2>

                    <form class="contactoForm__box">

                        <!-- NOMBRE / APELLIDO -->
                        <div class="row g-3">
                            <div class="col-12 col-md-6">
                                <label for="nombre" class="form-label contactoForm__label">Nombre</label>
                                <input type="text" class="form-control" id="nombre" placeholder="Tu nombre" required>
                            </div>

                            <div class="col-12 col-md-6">
                                <label for="apellido" class="form-label contactoForm__label">Apellido</label>
                                <input type="text" class="form-control" id="apellido" placeholder="Tu apellido"
                                    required>
                            </div>
                        </div>

                        <!-- EMAIL -->
                        <div class="mt-3">
                            <label for="email" class="form-label contactoForm__label">Correo electrónico</label>
                            <input type="email" class="form-control" id="email" placeholder="tudirección@email.com"
                                required>
                        </div>

                        <!-- CHECK + SELECT -->
                        <div class="mt-3 d-flex flex-column gap-2">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" value="" id="cotizar">
                                <label class="form-check-label contactoForm__label" for="cotizar">
                                    ¿Necesitas cotizar un producto?
                                </label>
                            </div>

                            <div>
                                <label for="producto" class="form-label contactoForm__label">Selecciona el
                                    producto/servicio</label>
                                <select class="form-select" id="producto">
                                    <option selected>Ninguno</option>
                                    <option value="Papeleria">Papelería</option>
                                    <option value="Cuadernos">Cuadernos</option>
                                    <option value="Carteles">Carteles</option>
                                    <option value="Planner">Planner</option>
                                    <option value="Domino">Dominó</option>
                                    <option value="Otros">Otros</option>
                                </select>
                            </div>
                        </div>

                        <!-- MENSAJE -->
                        <div class="mt-3">
                            <label for="mensaje" class="form-label contactoForm__label">Cuéntanos los detalles</label>
                            <textarea class="form-control" id="mensaje" rows="5" placeholder="Escribe tu consulta..."
                                required></textarea>
                        </div>

                        <!-- BOTONES -->
                        <div class="mt-4 d-grid gap-2 d-sm-flex">
                            <button type="submit" id="btn__send"
                                class="btn btn-primary contactoForm__btn contactoForm__btn--send">
                                Enviar
                            </button>
                            <button type="reset"
                                class="btn btn-outline-secondary contactoForm__btn contactoForm__btn--reset">
                                Restablecer
                            </button>
                        </div>

                    </form>
                </section>

            </div>

            <!-- COLUMNA 2: MAPA -->
            <div class="contactoLayout__col contactoLayout__col--map">

                <!-- SECCION "DONDE ENCONTRARNOS" -->
                <section class="ubicacion" aria-label="Dónde encontrarnos">
                    <h2 class="ubicacion__title">Dónde encontrarnos</h2>

                    <div class="ubicacion__mapBox" aria-label="Mapa de ubicación">
                        <iframe class="ubicacion__map" title="Ubicación Serendipia en Google Maps"
                            src="https://www.google.com/maps?q=Montevideo%20Uruguay&output=embed" loading="lazy"
                            referrerpolicy="no-referrer-when-downgrade">
                        </iframe>
                    </div>
                </section>

            </div>

        </section>

    </main>

    <!-- --------------------------------------------------- -->
    <!-- FOOTER -->

    <footer class="footer">
        <div class="footer__box">

            <!-- INFO -->
            <div class="footer__info">
                <p class="footer__line">Celular de contacto <strong>(+598) 123 456</strong></p>
                <p class="footer__line"><strong>Uruguay | Dirección Calle Sarasa N° 123</strong></p>
                <p class="footer__line">Horario de atención: <strong>Lunes a Viernes | 09:00 h a 18:00 h</strong></p>
            </div>

            <!-- LOGOS REDES (CENTRO) -->
            <nav class="footer__social" aria-label="Redes sociales">
                <!-- INSTAGRAM -->
                <a class="footer__icon" href="https://www.instagram.com/serendipia_art.uy/?hl=es-la" target="_blank"
                    aria-label="Instagram">
                    <img src="../img/logoredes-ig.png" alt="Icono de Instagram">
                </a>
                <!-- FACEBOOK -->
                <a class="footer__icon" href="https://www.facebook.com/profile.php?id=61572927813708&locale=es_LA"
                    target="_blank" aria-label="Facebook">
                    <img src="../img/logoredes-fb.png" alt=" Icono de Facebook">
                </a>
                <!--EMAIL -->
                <a class="footer__icon" href="mailto:marcelaballadares96@gmail.com"
                    aria-label="Enviar email a Serendipia">
                    <img src="../img/logoredes-mail.png" alt="Icono de Email">
                </a>
            </nav>

            <!-- LOGO AL HOME -->
            <a class="footer__home" href="../index.html" aria-label="Volver al inicio">
                <img src="../img/logoserendipiacolor.png" alt="Logo de Serendipia">
            </a>

        </div>
    </footer>

    <!-- BOOSTRAP SCRIPT JS-->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
